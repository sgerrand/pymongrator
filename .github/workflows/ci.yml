name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  UV_FROZEN: "1"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: mado
        uses: akiomik/mado@9b5cb3a1d234ddbacad4dd811aaa2a1e671d5306 # v0.3.0

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Check lockfile is up to date
        run: uv lock --check

      - name: Install dependencies
        run: uv sync --group dev

      - name: ruff check
        run: uv run ruff check

      - name: ruff format
        run: uv run ruff format --check

      - name: ty check
        run: uv run ty check

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Unit tests
        env:
          COVERAGE_FILE: reports/.coverage.unit
        run: >-
          uv run pytest tests/unit/
          --tb=short
          --junit-xml=reports/junit-unit.xml
          --cov=mongrator
          --cov-report=term-missing
          --cov-report=xml:reports/coverage-unit.xml

      - name: Integration tests
        env:
          COVERAGE_FILE: reports/.coverage.integration
        run: >-
          uv run pytest tests/integration/
          --tb=short
          --junit-xml=reports/junit-integration.xml
          --cov=mongrator
          --cov-report=term-missing
          --cov-report=xml:reports/coverage-integration.xml

      - name: Combine coverage
        run: |
          uv run coverage combine reports/.coverage.unit reports/.coverage.integration
          uv run coverage lcov -o reports/lcov.info

      - name: Upload to Coveralls
        uses: coverallsapp/github-action@5cbfd81b66ca5d10c19b062c04de0199c215fb6e # v2
        with:
          file: reports/lcov.info

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-reports
          path: reports/
          retention-days: 14
